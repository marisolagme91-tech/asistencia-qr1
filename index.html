<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px;">

    <h2 style="color: #333;">📸 Escáner de Alumnos</h2>
    
    <div id="reader" style="width: 100%; max-width: 400px; margin: auto; background: white; border-radius: 10px;"></div>
    
    <div id="mensaje" style="margin-top: 20px; padding: 15px; font-weight: bold; background: white; border-radius: 5px; display: inline-block;">
        Esperando escaneo...
    </div>

    <script>
        // --- PEGA TU URL DE GOOGLE AQUÍ ABAJO ---
        const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbzRqz1ilYgBXFC0cPBwijnZgm-dJXyjZOqiXWAX6zYQ82PwLFKW5clykpvk5fCCMq5flg/exec"; 

        function onScanSuccess(decodedText) {
            document.getElementById("mensaje").innerText = "Registrando: " + decodedText;
            document.getElementById("mensaje").style.color = "blue";

            // Usamos el método de la "Imagen invisible" para saltar bloqueos de seguridad
            var img = new Image();
            img.src = URL_GOOGLE + "?alumnoId=" + encodeURIComponent(decodedText);
            
            img.onload = function() {
                confirmar(decodedText);
            };
            
            // Por si Google no responde con una imagen, confirmamos tras 1 segundo
            setTimeout(function() {
                confirmar(decodedText);
            }, 1000);
        }

        function confirmar(texto) {
            document.getElementById("mensaje").innerText = "✅ REGISTRADO: " + texto;
            document.getElementById("mensaje").style.color = "green";
            if (navigator.vibrate) navigator.vibrate(200);
        }

        function onScanFailure(error) {
            // No mostrar errores de enfoque para no saturar la pantalla
        }

        // Configuración del escáner
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { fps: 10, qrbox: {width: 250, height: 250} }
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
